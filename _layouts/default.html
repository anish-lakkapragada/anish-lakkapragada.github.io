<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fafaf9">

  {% seo title=false %}

  <title>
    {%- if page.title -%}{{ page.title }} — {{ site.title }}{%- else -%}{{ site.title }}{%- endif -%}
  </title>

  <link rel="icon" href="{{ '/assets/img/favicons/favicon.ico' | relative_url }}" type="image/x-icon">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Site CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% if page.math %}
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });">
  </script>
  {% endif %}
</head>
<body>
  <div class="site-wrapper">
    {% include nav.html %}
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
  </div>

  <!-- Page transition: blur out on internal navigation -->
  <script>
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (!link) return;
      const href = link.getAttribute('href');
      if (!href) return;
      // Only intercept internal, same-tab links
      if (link.target === '_blank') return;
      if (href.startsWith('http') || href.startsWith('mailto:') || href.startsWith('javascript:')) return;
      if (href.endsWith('.pdf')) return;

      e.preventDefault();
      document.body.classList.add('is-navigating');
      setTimeout(function() { window.location.href = href; }, 250);
    });
  </script>
</body>
</html>
