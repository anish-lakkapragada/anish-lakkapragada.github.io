<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Anish Lakkapragada</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" type="image/x-icon" href="/assets/img/favicons/favicon.ico">
    <link rel="canonical" href="{{ site.url }}/">
    <style>
      body {
        font: 14px/1.5 'Helvetica', 'Arial', sans-serif;
        max-width: 390px;
        margin: 50px;
        padding: 0 1rem;
        position: relative;
      }

      a {
        color: #22558e;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .about {
        margin-bottom: 2rem;
      }

      .photo {
        max-width: 390px;
        margin-bottom: 2rem;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      .photo p {
        font-style: italic;
        text-align: right;
        margin-top: 0.25rem;
        font-size: 12px;
      }

      .links ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .links li {
        padding: 2px 0;
      }

      @media (max-width: 480px) {
        body {
          margin: 24px;
        }
      }
    </style>
  </head>
  <body>

    <div class="about">
      {{ content }}
    </div>

    <div class="photo">
      <a id="photo-link"><img id="photo-img" alt=""></a>
      <p id="photo-caption"></p>
    </div>

    <div class="links">
      <ul>
        <li><a href="/notes/">notes</a></li>
        <li><a href="/blogs/">blogs</a></li>
        <li><a href="/cv/">cv</a></li>
        <li><a href="/bookshelf/">bookshelf</a></li>
      </ul>
    </div>

      ];

      const STATES = {"Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA","Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA","Hawaii":"HI","Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS","Kentucky":"KY","Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA","Michigan":"MI","Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT","Nebraska":"NE","Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY","North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR","Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD","Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA","Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY"};

      // Normalize an Unsplash location object to "City, ST" (or "City, Country"
      // outside the US). Returns null if there isn't enough to format cleanly.
      function formatPlace(loc) {
        if (!loc || !loc.name) return null;
        const parts = loc.name.split(',').map(s => s.trim()).filter(Boolean);
        const isUS = /^(USA|United States)$/i.test(parts[parts.length - 1] || '');
        if (!isUS) {
          return loc.city && loc.country ? loc.city + ', ' + loc.country : null;
        }
        parts.pop();
        let state = parts.pop() || '';
        state = STATES[state] || state;
        if (!/^[A-Z]{2}$/.test(state)) return null;
        const city = loc.city || parts.pop();
        return city ? city + ', ' + state : null;
      }

      function show(id, src, place) {
        document.getElementById('photo-img').src = src;
        document.getElementById('photo-img').alt = 'a bird photographed in ' + place;
        document.getElementById('photo-link').href = 'https://unsplash.com/photos/' + id;
        document.getElementById('photo-caption').textContent = 'Photographed in ' + place;
        try { localStorage.setItem('lastPhoto', id); } catch (e) {}
      }

      function showFallback() {
        let last = null;
        try { last = localStorage.getItem('lastPhoto'); } catch (e) {}
        let pick = FALLBACK[Math.floor(Math.random() * FALLBACK.length)];
        if (pick.id === last) pick = FALLBACK[(FALLBACK.indexOf(pick) + 1) % FALLBACK.length];
        show(pick.id, pick.url + '?w=780&q=80&auto=format', pick.place);
      }

      if (UNSPLASH_KEY) {
        fetch('https://api.unsplash.com/photos/random?username=anishlk&client_id=' + UNSPLASH_KEY)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(p => {
            const place = formatPlace(p.location);
            if (!place) throw new Error('no location');
            show(p.id, p.urls.regular, place);
          })
          .catch(showFallback);
      } else {
        showFallback();
      }
    </script>

  </body>
</html>
