<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Anish Lakkapragada</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" type="image/x-icon" href="/assets/img/favicons/favicon.ico">
    <link rel="canonical" href="{{ site.url }}/">
    <style>
      body {
        font: 14px/1.5 'Helvetica', 'Arial', sans-serif;
        max-width: 390px;
        margin: 50px;
        padding: 0 1rem;
        position: relative;
      }

      a {
        color: #22558e;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .about {
        margin-bottom: 2rem;
      }

      .photo {
        max-width: 390px;
        margin-bottom: 2rem;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      .photo p {
        font-style: italic;
        text-align: right;
        margin-top: 0.25rem;
        font-size: 12px;
      }

      .links ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .links li {
        padding: 2px 0;
      }

      @media (max-width: 480px) {
        body {
          margin: 24px;
        }
      }
    </style>
  </head>
  <body>

    <div class="about">
      {{ content }}
    </div>

    <div class="photo">
      <a id="photo-link"><img id="photo-img" alt=""></a>
      <p id="photo-caption"></p>
    </div>

    <div class="links">
      <ul>
        <li><a href="/notes/">notes</a></li>
        <li><a href="/blogs/">blogs</a></li>
