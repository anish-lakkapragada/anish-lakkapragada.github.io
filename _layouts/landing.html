<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Anish Lakkapragada</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" type="image/x-icon" href="/assets/img/favicons/favicon.ico">
    <link rel="canonical" href="{{ site.url }}/">
    <link href="/assets/css/plain.css" rel="stylesheet">
  </head>
  <body>

    <div class="about">
      {{ content }}
    </div>

    <div class="photo">
      <a id="photo-link"><img id="photo-img" alt=""></a>
      <p id="photo-caption"></p>
    </div>

    <div class="links">
      <ul>
        <li><a href="/notes/">notes</a></li>
        <li><a href="/blogs/">blogs</a></li>
        <li><a href="/sparse-autoencoder/">sparse autoencoder</a></li>
        <li><a href="/cv/">cv</a></li>
        <li><a href="/bookshelf/">bookshelf</a></li>
      </ul>
    </div>

    <script>
      // Photo list is generated by tools/update_unsplash_photos.py (run on
      // every deploy) from unsplash.com/@anishlk. Entries with place=null
      // lack usable location data and are skipped.
      //
      // Sampling is weighted: Bay Area shots vastly outnumber everywhere
      // else (~370 of ~530), so they get BAY_WEIGHT each to keep the
      // rotation from feeling like an endless South Bay slideshow. At 0.1
      // the Bay Area still shows up roughly one visit in five.
      const BAY_AREA = new Set([
        'Bay Area, CA', 'San Francisco, CA', 'Oakland, CA', 'Lafayette, CA',
        'Fremont, CA', 'San Jose, CA', 'Cupertino, CA', 'Milpitas, CA',
        'Santa Clara, CA', 'Palo Alto, CA', 'Los Altos, CA', 'Stanford, CA',
        'Menlo Park, CA', 'Redwood City, CA', 'Morgan Hill, CA',
        'Half Moon Bay, CA', 'Pescadero State Beach, CA',
        'Point Reyes, CA', 'Inverness, CA', 'Abbotts Lagoon, CA',
      ]);
      const BAY_WEIGHT = 0.1;
      const weight = p => (BAY_AREA.has(p.place) ? BAY_WEIGHT : 1);

      fetch('/assets/data/photos.json')
        .then(r => r.json())
        .then(all => {
          const photos = all.filter(p => p.place);
          if (!photos.length) return;

          let last = null;
          try { last = localStorage.getItem('lastPhoto'); } catch (e) {}

          const pool = photos.length > 1 ? photos.filter(p => p.id !== last) : photos;
          let r = Math.random() * pool.reduce((s, p) => s + weight(p), 0);
          let pick = pool[pool.length - 1];
          for (const p of pool) {
            r -= weight(p);
            if (r <= 0) { pick = p; break; }
          }

          const caption = pick.species
            ? pick.species + ' photographed in ' + pick.place
            : 'Photographed in ' + pick.place;
          document.getElementById('photo-img').src = pick.url + '?w=780&q=80&auto=format';
          document.getElementById('photo-img').alt = caption.toLowerCase();
          document.getElementById('photo-link').href = 'https://unsplash.com/photos/' + pick.id;
          document.getElementById('photo-caption').textContent = caption;
          try { localStorage.setItem('lastPhoto', pick.id); } catch (e) {}
        });
    </script>

  </body>
</html>
